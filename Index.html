<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo | Catálogo de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container welcome-container">
        <header class="header-amarelo">
            <h1>🍔 Bem-vindo!</h1>
            <p>Preencha os seus dados para iniciarmos o seu pedido.</p>
        </header>

        <main class="card">
            <form id="form-cliente">
                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" placeholder="Ex: João da Silva" required>
                </div>

                <div class="form-group">
                    <label for="provincia">Província:</label>
                    <select id="provincia" required>
                        <option value="" disabled selected>Selecione a sua província...</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Cabinda">Cabinda</option>
                        </select>
                </div>

                <div class="form-group">
                    <label for="municipio">Município:</label>
                    <input type="text" id="municipio" placeholder="Ex: Viana, Talatona..." required>
                </div>

                <div class="form-group">
                    <label for="bairro">Rua / Bairro:</label>
                    <input type="text" id="bairro" placeholder="Ex: Zango 3, Rua Principal" required>
                </div>

                <button type="submit" class="btn-primario">Ver o Menu 🍽️</button>
            </form>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
                    </html>
