<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo | Catálogo de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container welcome-container">
        <!-- Cabeçalho atualizado -->
        <header class="header-amarelo">
            <img src="img/logo.png" alt="Logotipo da Loja" class="logo-loja">
            <h1 id="saudacao">Olá, <span id="nome-cliente-display"></span>! 🍕</h1>
            <p>O que vai desejar para hoje?</p>
        </header>

        <main class="card">
            <form id="form-cliente">
                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" placeholder="Ex: Emílio da Silva" required>
                </div>

                <div class="form-group">
                    <label for="provincia">Província:</label>
                    <select id="provincia" required>
                        <option value="" disabled selected>Selecione a sua província...</option>
                        <option value="Bengo">Bengo</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Bié">Bié</option>
                        <option value="Cabinda">Cabinda</option>
                        <option value="Cuando">Cuando</option>
                        <option value="Cuando Cubango">Cuando Cubango</option>
                        <option value="Cuanza Norte">Cuanza Norte</option>
                        <option value="Cuanza Sul">Cuanza Sul</option>
                        <option value="Cunene">Cunene</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Huíla">Huíla</option>
                        <option value="Icolo e Bengo">Icolo e Bengo</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Lunda Norte">Lunda Norte</option>
                        <option value="Lunda Sul">Lunda Sul</option>
                        <option value="Malanje">Malanje</option>
                        <option value="Moxico">Moxico</option>
                        <option value="Moxico Leste">Moxico Leste</option>
                        <option value="Namibe">Namibe</option>
                        <option value="Uíge">Uíge</option>
                        <option value="Zaire">Zaire</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="municipio">Município:</label>
                    <input type="text" id="municipio" placeholder="Ex: Huambo, Caála..." required>
                </div>

                <div class="form-group">
                    <label for="bairro">Rua / Bairro:</label>
                    <input type="text" id="bairro" placeholder="Ex: Bairro Benfica, Rua Bié" required>
                </div>

                <button type="submit" class="btn-primario">Ver o Menu 🍽️</button>
            </form>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
                </html>
