<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | Catálogo de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .carrinho-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .carrinho-info {
            flex-grow: 1;
        }
        .carrinho-controles {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 15px;
        }
        .btn-qtd {
            background-color: var(--cor-cinza-escuro);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-remover {
            background-color: var(--cor-vermelho);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-azul">
            <h1>🛒 O Seu Carrinho</h1>
            <p>Revise os itens e quantidades antes de avançar.</p>
        </header>

        <main class="card">
            <div id="itens-carrinho">
                </div>
            
            <div class="total-container">
                Total do Pedido: <span id="valor-total">0</span> Kz
            </div>
        </main>
    </div>

    <div class="nav-inferior">
        <button class="btn-primario" onclick="window.location.href='menu.html'">⬅️ Voltar</button>
        <button class="btn-sucesso" id="btn-confirmar">Confirmar Pedido ✅</button>
    </div>

    <script src="js/app.js"></script>
</body>
    </html>
